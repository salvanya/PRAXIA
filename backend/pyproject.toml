[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
disallow_untyped_defs = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
markers = [
    "integration: requires running Postgres/Qdrant (deselect with -m 'not integration')",
    "llm: requires a running Ollama with the configured model",
    "pii: requires the spaCy model es_core_news_md + presidio (deselect with -m 'not pii')",
]
