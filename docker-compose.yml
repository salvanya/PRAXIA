services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: praxia
      POSTGRES_PASSWORD: praxia
      POSTGRES_DB: praxia
    ports:
      - "5432:5432"
    volumes:
      - praxia_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U praxia"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - praxia_qdrant:/qdrant/storage

volumes:
  praxia_pg:
  praxia_qdrant:
